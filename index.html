<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ESTILOS ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5fafd; padding: 1rem; }

        /* Header */

        .logo-area i { font-size: 1.5rem; color: #1d7a8f; background: #e3f2f9; padding: 0.4rem; border-radius: 50%; }

        /* Botón admin */
        .btn-admin {

        /* Modal Login */
        .modal-overlay {
            display: none;

            top: 0;
            left: 0;

            height: 100%;

        .modal-login {
            background: white;
            padding: 2rem;
            border-radius: 30px;

        .modal-login h3 {
            margin-bottom: 1.5rem;

            align-items: center;

        .modal-login input {

        }

        }
        
        .btn-cerrar:hover {

        /* ===== BUSCADOR ===== */
        .buscador-container {
            background: white;

            margin: 1rem 0;

        }
        
        .buscador-container i {

        #buscadorInput {
            flex: 1;
            border: none;

            font-size: 1rem;
            padding: 0.3rem 0;
            background: transparent;
        }
        
        #buscadorInput::placeholder {

        }
        
        .btn-limpiar {
            background: none;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
        }
        
        .btn-limpiar:hover {
            background: #f0f7fc;
            color: #e74c3c;
        }
        
        /* ===== MODAL IMAGEN ===== */
        .modal-imagen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal-imagen-contenido {
            background: white;

            width: 90%;
            border-radius: 30px;
            overflow: hidden;
            animation: zoomIn 0.3s;
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-imagen-header {
            background: #1f7a8c;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-imagen-header h3 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-cerrar-modal {

            padding: 0 0.5rem;

        .modal-imagen-detalles p {

        .modal-imagen-detalles .precio-modal {

        .stock-modal.disponible {

        }
        
        .stock-modal.agotado {

            color: #b13e3e;
        }
        
        /* Filtros */
        .filtros-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.4rem; 
            margin: 1rem 0; 
            background: white; 
            padding: 0.8rem 1rem; 
            border-radius: 40px; 
        }
        
        .btn-categoria { 
            background: transparent; 
            border: none; 
            padding: 0.4rem 1rem; 
            border-radius: 30px; 
            font-size: 0.8rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        
        .btn-categoria.activo { 
            background: #1f7a8c; 
            color: white; 
        }
        
        .categorias-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1rem; 
        }
        
        .hidden-category { 
            display: none !important; 
        }
        
        /* Resultado de búsqueda vacío */
        .no-resultados {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 40px;
            color: #5f7e8f;
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #d4e6f0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .img-container { 
            width: 100%; 
            height: 120px; 
            position: relative; 
            overflow: hidden;
            cursor: pointer;
        }
        
        .img-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .img-container:hover img {
            transform: scale(1.1);
        }
        
        .img-container::after {
            content: "🔍";
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(255,255,255,0.8);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;

        .img-container:hover::after {
            opacity: 1;

            left: 8px;

            font-size: 0.65rem;

            align-items: center; 
            gap: 4px;

        .card-content { 
            padding: 0.8rem;

        .nombre-producto { 
            font-size: 0.95rem; 
            font-weight: 700;

            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2;

            cursor: pointer;

        .nombre-producto:hover {

        }
        
        .precio-stock-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #f0f7fc; 
            border-radius: 30px; 
            padding: 0.3rem 0.6rem; 
            margin: 0.5rem 0; 
        }
        
        .precio { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: #166b7c; 
        }
        
        .iva-badge {
            font-size: 0.65rem;
            background: #d4e6f0;
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            color: #1f7a8c;
            font-weight: 600;
            margin-left: 0.3rem;
        }
        
        .stock-indicator { 
            display: flex; 
            align-items: center; 
            gap: 3px;

            padding: 0.2rem 0.6rem; 
            border-radius: 30px;

        .stock-indicator.disponible {

            background: #e2ffee; 
        }
        
        .stock-indicator.agotado { 
            color: #b13e3e;

        }
        
        .control-cantidad { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #d0e2f0; 
            border-radius: 30px;

        .control-cantidad label { 
            font-size: 0.7rem; 
            color: #1b4e5d; 
        }
        
        .control-cantidad input { 
            width: 50px; 
            border: none; 
            background: #eef7fd; 
            text-align: center; 
            padding: 0.3rem 0; 
            border-radius: 30px; 
        }
        
        .btn-wsp { 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 0.5rem; 
            border-radius: 30px; 
            width: 100%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;

        }
        
        .btn-wsp:hover {
            background: #1fab5a;
        }
        
        .disabled-btn { 
            opacity: 0.4; 
            pointer-events: none; 
            background: #98aebb; 
        }
        
        .contador-productos { 
            margin: 0.5rem 0; 
            color: #1f7a8c;

        }
        
        /* Footer con datos de contacto */
        .footer-contacto {
            margin-top: 3rem;
            background: white;
            padding: 1.5rem;
            border-radius: 40px;
            border: 1px solid #d4e6f0;
        }
        
        .contacto-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            align-items: center;
        }
        
        .contacto-item {
            display: flex;

            gap: 10px;

        }
        
        .contacto-item i {
            font-size: 1.3rem;
            color: #1f7a8c;
        }
        
        .contacto-item a {
            color: #1f7a8c;
            text-decoration: none;
        }
        
        .contacto-item a:hover {
            text-decoration: underline;
        }
        
        .social-icon {
            background: #1f7a8c;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }
        
        .social-icon:hover {
            transform: scale(1.1);
            background: #e4405f; /* Color de Instagram */
        }
        
        .footer-note { 
            text-align: center; 
            color: #5f7e8f;
            margin-top: 1rem;
        }
    </style>
</head>

<div class="container">

<script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDC9xFg5QypLX-ZnXBN55FmME39Lot9hLY",
        authDomain: "medicalbuy-db.firebaseapp.com",
        databaseURL: "https://medicalbuy-db-default-rtdb.firebaseio.com",
        projectId: "medicalbuy-db",
        storageBucket: "medicalbuy-db.firebasestorage.app",
        messagingSenderId: "269696757008",
        appId: "1:269696757008:web:9b74ecbed3f0e315e0c995",
        measurementId: "G-664NJ16CLN"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ========== CONFIGURACIÓN ==========
    const WHATSAPP_NUMBER = "593986501112"; // Número Ecuador
    const ADMIN_USER = "Admin";
    const ADMIN_PASS = "AdminTecno";

    // ========== ELEMENTOS DOM ==========
    const modal = document.getElementById('modalLogin');
    const btnAbrirLogin = document.getElementById('btnAbrirLogin');
    const btnCerrarModal = document.getElementById('btnCerrarModal');
    const btnIngresar = document.getElementById('btnIngresar');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const grid = document.getElementById('appGrid');
    const filtrosDiv = document.getElementById('filtrosCategorias');
    const contadorSpan = document.getElementById('contadorProductos');
    
    // ===== NUEVO: Elementos del buscador =====
    const buscadorInput = document.getElementById('buscadorInput');
    const btnLimpiarBusqueda = document.getElementById('btnLimpiarBusqueda');
    
    // ===== Elementos del modal de imagen =====
    const modalImagen = document.getElementById('modalImagen');
    const btnCerrarModalImagen = document.getElementById('btnCerrarModalImagen');
    const modalImagenBody = document.getElementById('modalImagenBody');

    console.log('Elementos DOM:', { modal, btnAbrirLogin, btnCerrarModal, btnIngresar });

    // ========== VARIABLES GLOBALES ==========
    let productos = [];
    let categoriaActiva = 'todas';
    let textoBusqueda = '';

    // ===== NUEVO: Función para filtrar por búsqueda =====
    function filtrarPorBusqueda() {
        textoBusqueda = buscadorInput.value.toLowerCase().trim();
        aplicarFiltroCompleto();
    }
    
    // Limpiar búsqueda
    btnLimpiarBusqueda.addEventListener('click', () => {
        buscadorInput.value = '';
        textoBusqueda = '';
        aplicarFiltroCompleto();
    });
    
    // Buscar mientras escribes
    buscadorInput.addEventListener('input', filtrarPorBusqueda);

    // ===== NUEVO: Función que combina categoría + búsqueda =====
    function aplicarFiltroCompleto() {
        const tarjetas = document.querySelectorAll('.card');
        let productosVisibles = 0;
        
        tarjetas.forEach(card => {
            const catCard = card.dataset.categoria;
            const nombreProducto = card.dataset.nombre?.toLowerCase() || '';
            const categoriaProducto = card.dataset.categoria?.toLowerCase() || '';
            
            // Verificar si cumple filtro de categoría
            const cumpleCategoria = categoriaActiva === 'todas' || catCard === categoriaActiva;
            
            // Verificar si cumple filtro de búsqueda
            const cumpleBusqueda = textoBusqueda === '' || 
                                  nombreProducto.includes(textoBusqueda) || 
                                  categoriaProducto.includes(textoBusqueda);
            
            if (cumpleCategoria && cumpleBusqueda) {
                card.classList.remove('hidden-category');
                productosVisibles++;
            } else {
                card.classList.add('hidden-category');
            }
        });
        
        // Actualizar contador
        if (textoBusqueda && categoriaActiva !== 'todas') {
            contadorSpan.textContent = `Mostrando ${categoriaActiva} - "${textoBusqueda}": ${productosVisibles} productos`;
        } else if (textoBusqueda) {
            contadorSpan.textContent = `Buscando "${textoBusqueda}": ${productosVisibles} productos`;
        } else if (categoriaActiva !== 'todas') {
            contadorSpan.textContent = `Mostrando ${categoriaActiva}: ${productosVisibles} productos`;
        } else {
            contadorSpan.textContent = `Mostrando todos los productos (${productosVisibles})`;
        }
        
        // Mostrar mensaje si no hay resultados
        if (productosVisibles === 0 && tarjetas.length > 0) {
            const noResultados = document.querySelector('.no-resultados');
            if (!noResultados) {
                const mensaje = document.createElement('div');
                mensaje.className = 'no-resultados';
                mensaje.innerHTML = `
                    <i class="fas fa-search fa-3x" style="margin-bottom: 1rem; opacity: 0.5;"></i>
                    <h3>No se encontraron productos</h3>
                    <p>Intenta con otra búsqueda o categoría</p>
                `;
                grid.appendChild(mensaje);
            }
        } else {
            const noResultados = document.querySelector('.no-resultados');
            if (noResultados) noResultados.remove();
        }
    }

    // ===== Función para abrir modal de imagen (actualizada con IVA) =====
    function abrirModalImagen(producto) {
        const tieneStock = producto.stock > 0;
        const stockClass = tieneStock ? 'disponible' : 'agotado';
        const stockText = tieneStock ? producto.stock + ' en stock' : 'AGOTADO';
        const ivaTexto = producto.iva !== undefined ? `${producto.iva}% IVA` : 'IVA no especificado';
        
        modalImagenBody.innerHTML = `
            <img src="${producto.imagen}" alt="${producto.producto}" onerror="this.src='https://placehold.co/400x300/dfeef8/3b7e9c?text=IMG'">
            <div class="modal-imagen-detalles">
                <p><i class="fas fa-tag"></i> <strong>Producto:</strong> ${producto.producto}</p>
                <p><i class="fas fa-folder"></i> <strong>Categoría:</strong> ${producto.categoria}</p>
                <p><i class="fas fa-dollar-sign"></i> <strong>Precio:</strong> <span class="precio-modal">$${producto.precio.toLocaleString('es-EC')}</span> <small>/${producto.unidad || 'unidad'}</small></p>
                <p><i class="fas fa-percent"></i> <strong>IVA:</strong> <span class="iva-modal">${ivaTexto}</span></p>
                <p><i class="fas fa-boxes"></i> <strong>Stock:</strong> <span class="stock-modal ${stockClass}">${stockText}</span></p>
            </div>
        `;
        modalImagen.style.display = 'flex';
    }

    // Cerrar modal de imagen
    btnCerrarModalImagen.addEventListener('click', () => {
        modalImagen.style.display = 'none';
    });

    modalImagen.addEventListener('click', (e) => {
        if (e.target === modalImagen) {
            modalImagen.style.display = 'none';
        }
    });

    // ========== LOGIN MODAL ==========
    if (btnAbrirLogin) {
        btnAbrirLogin.addEventListener('click', function() {
            console.log('Botón admin clickeado');
            modal.style.display = 'flex';
            username.value = '';
            password.value = '';
        });
    } else {
        console.error('No se encontró el botón admin');
    }

    if (btnCerrarModal) {
        btnCerrarModal.addEventListener('click', function() {
            console.log('Cancelar clickeado');
            modal.style.display = 'none';
        });
    }

    if (btnIngresar) {
        btnIngresar.addEventListener('click', function() {
            console.log('Ingresar clickeado');
            if (username.value === ADMIN_USER && password.value === ADMIN_PASS) {
                console.log('Credenciales correctas, abriendo admin.html');
                modal.style.display = 'none';
                window.open('admin.html', '_blank');
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        });
    }

    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });

    // ========== CARGAR PRODUCTOS DESDE FIREBASE ==========
    function cargarProductos() {
        const productosRef = database.ref('productos');
        
        productosRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                productos = Object.keys(data).map(key => ({
                    ...data[key],
                    id: key
                }));
            } else {
                productos = [];
            }
            
            console.log('Productos cargados:', productos.length);
            renderizarFiltros();
            renderizarTarjetas();
        });
    }

    // ========== RENDERIZAR FILTROS ==========
    function renderizarFiltros() {
        const categorias = [...new Set(productos.map(p => p.categoria))].sort();
        
        let html = `
            <button class="btn-categoria ${categoriaActiva === 'todas' ? 'activo' : ''}" data-categoria="todas">
                <i class="fas fa-border-all"></i> Todos
            </button>
        `;
        
        categorias.forEach(cat => {
            const prodEjemplo = productos.find(p => p.categoria === cat);
            const icono = prodEjemplo?.icono || 'fa-tag';
            html += `
                <button class="btn-categoria ${categoriaActiva === cat ? 'activo' : ''}" data-categoria="${cat}">
                    <i class="fas ${icono}"></i> ${cat}
                </button>
            `;
        });
        
        filtrosDiv.innerHTML = html;
        
        document.querySelectorAll('.btn-categoria').forEach(btn => {
            btn.addEventListener('click', function() {
                const categoria = this.dataset.categoria;
                categoriaActiva = categoria;
                
                document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');
                
                aplicarFiltroCompleto();
            });
        });
    }

    // ========== RENDERIZAR TARJETAS (ACTUALIZADO CON IVA) ==========
    function renderizarTarjetas() {
        if (productos.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">No hay productos disponibles</div>';
            contadorSpan.textContent = 'No hay productos';
            return;
        }
        
        let html = '';
        
        productos.forEach((prod, idx) => {
            const tieneStock = prod.stock > 0;
            const stockClass = tieneStock ? 'disponible' : 'agotado';
            const stockIcon = tieneStock ? 'fa-check-circle' : 'fa-times-circle';
            const stockText = tieneStock ? prod.stock : 'SIN STOCK';
            const ivaTexto = prod.iva !== undefined ? `${prod.iva}%` : '';
            
            // Escapar el producto para pasarlo a la función del modal
            const productoJSON = JSON.stringify(prod).replace(/'/g, "\\'");
            
            html += `
                <div class="card" data-categoria="${prod.categoria}" data-nombre="${prod.producto.toLowerCase()}" data-indice="${idx}">
                    <div class="img-container" onclick='abrirModalImagen(${productoJSON})'>
                        <img src="${prod.imagen}" alt="${prod.producto}" loading="lazy" 
                             onerror="this.src='https://placehold.co/300x200/dfeef8/3b7e9c?text=${encodeURIComponent(prod.categoria)}'">
                        <span class="cat-icon-overlay">
                            <i class="fas ${prod.icono || 'fa-tag'}"></i> ${prod.categoria}
                        </span>
                    </div>
                    <div class="card-content">
                        <div class="nombre-producto" onclick='abrirModalImagen(${productoJSON})'>${prod.producto}</div>
                        <div class="precio-stock-row">
                            <span class="precio">
                                $${prod.precio.toLocaleString('es-EC')} <small>/${prod.unidad || 'unidad'}</small>
                                ${ivaTexto ? `<span class="iva-badge">IVA ${ivaTexto}</span>` : ''}
                            </span>
                            <span class="stock-indicator ${stockClass}">
                                <i class="fas ${stockIcon}"></i> ${stockText}
                            </span>
                        </div>
                        <div class="control-cantidad">
                            <label><i class="fas fa-sort-numeric-up"></i> Cant</label>
                            <input type="number" class="input-cantidad" value="1" min="1" max="${prod.stock}" 
                                ${tieneStock ? '' : 'disabled'} 
                                data-index="${idx}"
                                data-precio="${prod.precio}" 
                                data-producto="${prod.producto}"
                                data-stock="${prod.stock}">
                        </div>
                        <button class="btn-wsp ${tieneStock ? '' : 'disabled-btn'}" 
                                data-index="${idx}" 
                                data-producto="${prod.producto}" 
                                data-precio="${prod.precio}" 
                                data-stock="${prod.stock}">
                            <i class="fab fa-whatsapp"></i> Pedir
                        </button>
                    </div>
                </div>
            `;
        });
        
        grid.innerHTML = html;
        aplicarFiltroCompleto();
        asignarEventosWSP();
    }

    // ========== EVENTOS WHATSAPP (ACTUALIZADO) ==========
    function asignarEventosWSP() {
        document.querySelectorAll('.btn-wsp:not(.disabled-btn)').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                
                const idx = this.dataset.index;
                const producto = this.dataset.producto;
                const precioUnit = parseFloat(this.dataset.precio);
                const stockMax = parseInt(this.dataset.stock);
                const productoObj = productos[idx];
                
                const inputCant = document.querySelector(`.input-cantidad[data-index="${idx}"]`);
                if (!inputCant) return;
                
                let cantidad = parseInt(inputCant.value);
                if (isNaN(cantidad) || cantidad < 1) cantidad = 1;
                if (cantidad > stockMax) cantidad = stockMax;
                
                const subtotal = precioUnit * cantidad;
                const ivaPorcentaje = productoObj.iva || 0;
                const ivaValor = subtotal * (ivaPorcentaje / 100);
                const total = subtotal + ivaValor;
                
                let mensaje = `🛒 *Pedido Médico - TecnoMed*%0A` +
                              `▪️ *Producto:* ${producto}%0A` +
                              `▪️ *Cantidad:* ${cantidad}%0A` +
                              `▪️ *Precio unit.:* $${precioUnit.toLocaleString('es-EC')}`;
                
                if (ivaPorcentaje > 0) {
                    mensaje += `%0A▪️ *IVA (${ivaPorcentaje}%):* $${ivaValor.toLocaleString('es-EC')}`;
                }
                
                mensaje += `%0A▪️ *TOTAL:* $${total.toLocaleString('es-EC')}`;
                
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${mensaje}`, '_blank');
            });
        });
    }

    // ========== INICIALIZAR ==========
    cargarProductos();
</script>
</body>
</html>
